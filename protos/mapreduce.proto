syntax = "proto3";

package mapreduce;

enum JobState {
  STATE_WAITING = 0;
  STATE_MAP = 1;
  STATE_REDUCE = 2;
  STATE_DONE = 3;
}

enum TaskState {
  STATE_IDLE = 0;
  STATE_IN_PROGRESS = 1;
  STATE_COMPLETED = 2;
}

enum TaskType {
  TASK_MAP = 0;
  TASK_REDUCE = 1;
  TASK_WAIT = 2;
  TASK_EXIT = 3;
}

service Coordinator {
  rpc getTask(GetTaskArgs) returns (GetTaskReply) {}
}

service WorkerService {
  rpc healthCheck(Empty) returns (HealthStatus) {}
}


message GetTaskArgs {
  string worker_id = 1;
}

message GetTaskReply {
  TaskType task_type = 1;
  int32 task_id = 2;
  repeated string files_to_process = 3;
  int32 n_reduce = 4;
}

message HealthStatus {
  int32 status = 1;
}

message Empty{}
